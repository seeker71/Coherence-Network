# Spec-leaks: numeric-prefix IDs that are actually spec IDs masquerading as ideas.
# These get is_curated=false and never appear in curated views, but remain in DB.
# Also includes UUID-style ids like "idea-xxxxx" from commit-evidence auto-discovery.
# Pattern-matched at migration time; no need to enumerate every one.
spec_leak_patterns:
  - "^[0-9]{3}-"                    # 001-xxx through 999-xxx
  - "^idea-[a-f0-9]{12}$"           # idea-XXXXXXXXXXXX
  - "^[a-f0-9]{8}-[a-f0-9]{4}-"     # full UUIDs

# Misc stubs that don't have a natural home — park under data-infrastructure
# Can be reviewed later for promotion or retirement.
stubs_park_under: data-infrastructure
stubs:
  - test-idea
  - test-idea-001
  - test-no-key
  - string?
  - test-cleanup

# Unknown/new ideas that aren't in children or stubs and don't match leak patterns
# get parked here. This guarantees every existing idea has a fractal home.
# When an idea's proper home becomes clear, move it to `children:` above.
default_park_under: data-infrastructure
