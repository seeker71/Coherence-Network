# Coherence Network pillar taxonomy — top-level grouping for ideas.
# Each idea's `pillar` field must match one of these values (or be null).
# See CLAUDE.md and ideas/INDEX.md for the fractal: 6 pillars → 16 super-ideas → leaves.
pillars:
  - realization   # Track every idea from inception to impact
  - pipeline      # Turn ideas into working software
  - economics     # CC as unit of account, value flows fairly
  - surfaces      # Where users meet the system
  - network       # How the platform federates and welcomes people
  - foundation    # Substrate everything rests on
