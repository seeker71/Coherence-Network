name: Hostinger API Native Deploy

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy. Defaults to main."
        required: false
        type: string

concurrency:
  group: hostinger-api-native-deploy-main
  cancel-in-progress: true

jobs:
  deploy-hostinger-api-native:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
      HOSTINGER_VIRTUAL_MACHINE_ID: ${{ vars.HOSTINGER_VIRTUAL_MACHINE_ID }}
      TARGET_SHA: ${{ github.event.inputs.sha || github.sha }}
      PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_DEPLOY_API_BASE || 'https://api.coherencycoin.com' }}
      PUBLIC_DEPLOY_WEB_BASE: ${{ vars.PUBLIC_DEPLOY_WEB_BASE || 'https://coherencycoin.com' }}
    steps:
      - uses: actions/checkout@v7

      - name: Deploy through Hostinger Docker API
        run: |
          test -n "$HOSTINGER_API_TOKEN"
          test -n "$HOSTINGER_VIRTUAL_MACHINE_ID"
          scripts/hostinger_api_native_deploy.sh "$HOSTINGER_VIRTUAL_MACHINE_ID" "$TARGET_SHA"

      - name: Verify public deployment
        run: |
          VERIFY_REQUIRE_API_HEALTH_SHA=1 \
          VERIFY_REQUIRE_WEB_HEALTH_PROXY_SHA=1 \
          SHA_PARITY_PATIENCE_SECONDS=180 \
            scripts/verify_web_api_deploy.sh "$PUBLIC_API_BASE_URL" "$PUBLIC_DEPLOY_WEB_BASE"
