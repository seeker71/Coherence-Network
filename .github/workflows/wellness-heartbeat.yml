name: Wellness heartbeat

# The body sensing itself autonomously.
#
# Runs daily and anytime someone invokes it manually. Reports whether
# the maps match the body, what has stopped circulating at root, and
# what metabolism is still in progress. When drift appears, it surfaces
# here in the Actions log — so the body can notice itself even when no
# human or agent is present to walk through it.
#
# Doesn't fail the build on drift. Drift is a signal, not a fault. The
# point is visibility, not enforcement.

on:
  schedule:
    - cron: '0 14 * * *'  # daily at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sense:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sense the body
        run: python3 scripts/wellness_check.py
