name: Hostinger Auto Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'web/**'
      - 'pulse/**'
      - 'deploy/hostinger/**'
      - 'scripts/verify_web_api_deploy.sh'
      - 'scripts/.gitnexus-pin'
      - '.github/workflows/hostinger-auto-deploy.yml'
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the triggering SHA)"
        required: false
        type: string

concurrency:
  group: hostinger-auto-deploy-main
  cancel-in-progress: true

jobs:
  deploy-hostinger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HOSTINGER_SSH_HOST: ${{ vars.HOSTINGER_SSH_HOST || 'root@187.77.152.42' }}
      HOSTINGER_DEPLOY_PATH: ${{ vars.HOSTINGER_DEPLOY_PATH || '/docker/coherence-network' }}
      PUBLIC_DEPLOY_API_BASE: ${{ vars.PUBLIC_DEPLOY_API_BASE || 'https://api.coherencycoin.com' }}
      PUBLIC_DEPLOY_WEB_BASE: ${{ vars.PUBLIC_DEPLOY_WEB_BASE || 'https://coherencycoin.com' }}
      TARGET_SHA: ${{ github.event.inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          test -n "$HOSTINGER_SSH_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/id_hostinger
          chmod 600 ~/.ssh/id_hostinger
          ssh-keyscan -H "${HOSTINGER_SSH_HOST#*@}" >> ~/.ssh/known_hosts

      - name: Sync tracked deploy script to VPS
        run: |
          scp -i ~/.ssh/id_hostinger deploy/hostinger/auto-deploy.sh "${HOSTINGER_SSH_HOST}:${HOSTINGER_DEPLOY_PATH}/auto-deploy.sh"
          scp -i ~/.ssh/id_hostinger deploy/hostinger/install-gitnexus.sh "${HOSTINGER_SSH_HOST}:${HOSTINGER_DEPLOY_PATH}/install-gitnexus.sh"
          ssh -i ~/.ssh/id_hostinger "${HOSTINGER_SSH_HOST}" "chmod +x ${HOSTINGER_DEPLOY_PATH}/auto-deploy.sh ${HOSTINGER_DEPLOY_PATH}/install-gitnexus.sh"

      - name: Roll forward VPS
        run: |
          set +e
          ssh -i ~/.ssh/id_hostinger -o ServerAliveInterval=30 -o ServerAliveCountMax=6 "${HOSTINGER_SSH_HOST}" \
            "COMPOSE_ROOT=${HOSTINGER_DEPLOY_PATH} REPO_DIR=${HOSTINGER_DEPLOY_PATH}/repo BRANCH=main ${HOSTINGER_DEPLOY_PATH}/auto-deploy.sh ${TARGET_SHA}"
          rc=$?
          set -e
          if [[ "$rc" -ne 0 ]]; then
            echo "::group::Remote deploy log tail"
            ssh -i ~/.ssh/id_hostinger -o ServerAliveInterval=30 -o ServerAliveCountMax=2 "${HOSTINGER_SSH_HOST}" \
              "tail -240 ${HOSTINGER_DEPLOY_PATH}/deploy.log" || true
            echo "::endgroup::"
            exit "$rc"
          fi

      - name: Verify public deployment
        # Web frontend rolls out a few seconds behind the API. Without retry,
        # SHA-parity races the rollout and emails a failure that resolves on its
        # own within 30-90s. Retry up to 3 times with a 30s backoff before
        # treating it as a real regression.
        run: |
          attempt=1
          max_attempts=3
          backoff=30
          while :; do
            set +e
            ./scripts/verify_web_api_deploy.sh "${PUBLIC_DEPLOY_API_BASE}" "${PUBLIC_DEPLOY_WEB_BASE}"
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::verify_web_api_deploy.sh failed after $attempt attempts (rc=$rc)"
              exit "$rc"
            fi
            echo "::warning::verify attempt $attempt failed (rc=$rc); likely rollout lag — sleeping ${backoff}s before retry"
            sleep "$backoff"
            attempt=$((attempt + 1))
          done
