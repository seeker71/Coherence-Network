name: Windows Host Floor

# Proves the Form-native floor is portable to Windows: the Go/Rust/TS kernels
# build and agree with the Form-emitted fkwu fourth arm on windows-latest, and
# the standalone native form-cli .exe runs with no Go/clang/LLVM available at
# runtime.

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      publish:
        description: "Build + upload the native Windows form-cli asset to a release"
        type: boolean
        default: false
      release_tag:
        description: "Release tag to upload the Windows asset to"
        required: false
        default: "hati-os-v0.2.0-20260614"

# Write is only exercised by the publish steps below, which are gated on a
# manual workflow_dispatch with publish=true. PR runs stay read-only proof.
permissions:
  contents: write

jobs:
  windows-floor:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path -LiteralPath (Join-Path $llvmBin "clang.exe"))) {
            throw "clang.exe missing from $llvmBin"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin

      - name: Prove agent PATH wrappers expose form-cli on Windows
        shell: pwsh
        run: |
          $env:Path = "$HOME\.local\bin;$env:Path"
          & "C:\Program Files\Git\bin\bash.exe" ./scripts/ensure_coord_cli.sh --quiet
          if ($LASTEXITCODE -ne 0) {
            throw "PATH wrapper refresh failed"
          }
          $cmd = Get-Command form-cli -ErrorAction Stop
          if ($cmd.Source -notlike "*.cmd") {
            throw "PowerShell did not resolve form-cli through the Windows command shim: $($cmd.Source)"
          }
          form-cli help | Select-String "form-cli" | Out-Null
          & "C:\Program Files\Git\bin\bash.exe" -lc 'command -v form-cli >/dev/null && form-cli help >/dev/null'
          if ($LASTEXITCODE -ne 0) {
            throw "Git Bash did not resolve runnable form-cli"
          }
          $startupProof = @'
          set -e
          poison="$(mktemp -d)"
          for tool in python python3 py go cargo rustc; do
            printf "%s\n" "#!/usr/bin/env sh" "echo unexpected form-cli startup dependency: $tool >&2" "exit 127" > "$poison/$tool"
            chmod +x "$poison/$tool"
          done
          export PATH="$HOME/.local/bin:$poison:/mingw64/bin:/usr/bin:/bin:/c/Windows/System32"
          command -v form-cli >/dev/null
          form-cli help >/tmp/form-cli-minimal-help
          '@
          $encodedStartupProof = [Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes($startupProof))
          & "C:\Program Files\Git\bin\bash.exe" -lc "printf '%s' '$encodedStartupProof' | base64 -d | bash"
          if ($LASTEXITCODE -ne 0) {
            throw "form-cli wrapper has a Python/Go/Rust startup dependency"
          }

      # Rust (rustup + cargo) is preinstalled on the windows-latest image;
      # validate.sh builds the Go/Rust kernels and bundles the TS kernel itself.
      - name: Prove the Form-native floor (four-way with fkwu on Windows)
        shell: bash
        run: |
          # Toolchain the floor needs (validate.sh builds Go/Rust/TS + fkwu).
          echo "go:    $(go version 2>&1 || echo MISSING)"
          echo "cargo: $(cargo --version 2>&1 || echo MISSING)"
          echo "node:  $(node --version 2>&1 || echo MISSING)"
          echo "npx:   $(npx --version 2>&1 || echo MISSING)"
          echo "clang: $(clang --version 2>&1 | head -1 || echo MISSING)"
          cd form
          # validate.sh requires cwd=form. Derive its path from $(pwd), a unix
          # path in Git Bash; $GITHUB_WORKSPACE is a Windows backslash path the
          # bash shell cannot execute directly.
          VALIDATE="$(pwd)/validate.sh"
          bash "$VALIDATE" form-stdlib/core.fk form-stdlib/adler32.fk form-stdlib/tests/adler32-band.fk | tee band1.out
          grep -q '0 divergent' band1.out || { echo "::error::kernels diverged (adler32)"; exit 1; }
          grep -q 'fourth arm: 1 band(s) four-way' band1.out || { echo "::error::fkwu fourth arm missing (adler32)"; exit 1; }
          bash "$VALIDATE" form-stdlib/core.fk form-stdlib/form-asm.fk form-stdlib/tests/form-asm-band.fk | tee band2.out
          grep -q '0 divergent' band2.out || { echo "::error::kernels diverged (form-asm)"; exit 1; }
          grep -q 'fourth arm: 1 band(s) four-way' band2.out || { echo "::error::fkwu fourth arm missing (form-asm)"; exit 1; }

      - name: Prove the field-relay decision bodies four-way + standalone fkwu on Windows
        shell: bash
        # The standard-receipt WINDOWS platform row: the three field decision
        # bodies (fiv-verdict 511, fr-route 127, fq-drain 127) cross four-way
        # incl. the fkwu fourth arm on this real Windows runner, AND the fkwu
        # binary runs each pre-flattened table STANDALONE (no walkers in the
        # loop) -> the same verdict. The standalone run prints the windows trace
        # that flips the receipt's windows row pending->observed.
        run: |
          cd form
          VALIDATE="$(pwd)/validate.sh"
          declare -A want=( [field-identity]=511 [field-relay]=127 [field-queue]=127 )
          for body in field-identity field-relay field-queue; do
            bash "$VALIDATE" "form-stdlib/$body.fk" "form-stdlib/tests/$body-band.fk" | tee "$body.out"
            grep -q '0 divergent' "$body.out" || { echo "::error::kernels diverged ($body)"; exit 1; }
            grep -q 'fourth arm: 1 band(s) four-way' "$body.out" || { echo "::error::fkwu fourth arm missing ($body)"; exit 1; }
          done
          # Standalone fkwu run: the windows binary answers each field table with
          # no Go/Rust/TS walker and no validate.sh comparison in the loop.
          FKWU="$(ls form-stdlib/.cache/fourth/fkwu-* 2>/dev/null | head -1)"
          [ -n "$FKWU" ] || { echo "::error::no fkwu binary in fourth cache"; exit 1; }
          echo "windows fkwu binary: $FKWU"; file "$FKWU" || true
          for body in field-identity field-relay field-queue; do
            T="$(ls form-stdlib/.cache/fourth/t-$body-*.txt 2>/dev/null | head -1)"
            [ -n "$T" ] || { echo "::error::no flattened table for $body"; exit 1; }
            V="$("$FKWU" "$T" 0 | head -1)"
            echo "STANDALONE windows fkwu: $body => $V (want ${want[$body]})"
            [ "$V" = "${want[$body]}" ] || { echo "::error::standalone fkwu $body gave $V, want ${want[$body]}"; exit 1; }
          done
          echo "WINDOWS RECEIPT ROW: fkwu standalone 511/127/127 on $(uname -s) $(uname -m)"

      - name: Prove fnri resource interfaces four-way + standalone fkwu on Windows
        shell: bash
        run: |
          bash scripts/verify_fnri_windows_standalone.sh

      - name: Prove Windows fkwu JIT and native form-cli runtime
        shell: pwsh
        run: |
          .\scripts\verify_windows_fkwu_socket_loopback.ps1
          .\scripts\verify_windows_fkwu_http_verbs_socket.ps1
          .\scripts\verify_windows_fkwu_http_response_socket.ps1
          .\scripts\verify_windows_fkwu_self_jit.ps1
          .\scripts\verify_windows_form_cli_native.ps1
          Push-Location form\form-kernel-go
          go test . -run 'TestWindows(RecipeDLL|BootstrapHost)' -count=1
          Pop-Location

      - name: Prove the model inference composition receipt on the Windows floor
        shell: bash
        run: |
          scripts/fkwu_form_cli_full_model_inference_composition_receipt.sh .cache/full-model-inference-composition-windows.json
          cat .cache/full-model-inference-composition-windows.json
          grep -q '"receipt_kind": "fkwu-form-cli-full-model-inference-composition-receipt"' .cache/full-model-inference-composition-windows.json
          grep -q '"full_model_inference_composed": false' .cache/full-model-inference-composition-windows.json

      # ---- Publish (manual dispatch only) -------------------------------------
      # Reached only after every proof step above passed, so the uploaded binary
      # is the exact form-cli.exe that just crossed the four-way Windows floor.
      - name: Build the standalone Windows form-cli (kept)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        shell: bash
        run: |
          cd form
          ./build-form-cli.sh .cache/form-cli-win.exe
          test -s .cache/form-cli-win.exe || { echo "::error::form-cli-win.exe not produced"; exit 1; }
          # Prove the kept binary still answers with no toolchain on PATH.
          printf 'ping\n' | ./.cache/form-cli-win.exe | grep -qx pong \
            || { echo "::error::built form-cli.exe did not pong"; exit 1; }

      - name: Package + checksum the Windows asset
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        shell: pwsh
        run: |
          $cache = "form/.cache"
          Copy-Item -LiteralPath "$cache/form-cli-win.exe" -Destination "$cache/form-cli.exe" -Force
          $zip = "$cache/hati-os-windows-amd64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$cache/form-cli.exe" -DestinationPath $zip -Force
          $h = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLower()
          # Match the shasum -a 256 two-space format the other assets use.
          [System.IO.File]::WriteAllText("$zip.sha256", "$h  hati-os-windows-amd64.zip`n")
          Get-Content "$zip.sha256"

      - name: Upload the Windows asset to the release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.release_tag }}"
          echo "Uploading hati-os-windows-amd64.zip(+.sha256) to release $tag"
          gh release upload "$tag" \
            form/.cache/hati-os-windows-amd64.zip \
            form/.cache/hati-os-windows-amd64.zip.sha256 \
            --clobber --repo "$GITHUB_REPOSITORY"
          echo "Published:"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | grep windows
