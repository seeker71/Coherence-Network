name: Auto-Track Contributions

on:
  # Moved from push trigger to daily schedule — CI noise reduction.
  # Tracks contributions from the last 24h of commits instead of per-push.
  schedule:
    - cron: "5 7 * * *"  # daily at 07:05 UTC
  workflow_dispatch:

jobs:
  track-contribution:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.COHERENCE_API_URL }}
      API_KEY: ${{ secrets.COHERENCE_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits from last 24h
        id: commit_info
        run: |
          # Collect all commits from the last 24 hours on main/develop
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
          COMMITS=$(git log --since="$SINCE" --format='%H %ae' --no-merges origin/main origin/develop 2>/dev/null || echo "")
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || echo "0")
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "Found $COMMIT_COUNT commits in the last 24h"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits to track."
            exit 0
          fi

          # Process the most recent commit for summary stats
          LATEST_HASH=$(echo "$COMMITS" | head -1 | awk '{print $1}')
          LATEST_EMAIL=$(echo "$COMMITS" | head -1 | awk '{print $2}')
          TOTAL_FILES=$(git log --since="$SINCE" --no-merges --format="" --numstat origin/main origin/develop 2>/dev/null | wc -l | tr -d ' ')
          TOTAL_LINES=$(git log --since="$SINCE" --no-merges --format="" --numstat origin/main origin/develop 2>/dev/null | awk '{sum+=$1} END {print sum+0}')

          echo "author_email=$LATEST_EMAIL" >> $GITHUB_OUTPUT
          echo "commit_hash=$LATEST_HASH" >> $GITHUB_OUTPUT
          echo "files_changed=$TOTAL_FILES" >> $GITHUB_OUTPUT
          echo "lines_added=$TOTAL_LINES" >> $GITHUB_OUTPUT

      - name: Calculate contribution cost
        if: steps.commit_info.outputs.commit_count != '0'
        id: calc_cost
        run: |
          FILES=${{ steps.commit_info.outputs.files_changed }}
          LINES=${{ steps.commit_info.outputs.lines_added }}

          # Normalized v2 estimator:
          # base 0.10 + 0.15/file + 0.002/line, clamped to [0.05, 10.00]
          COST=$(awk -v files="$FILES" -v lines="$LINES" 'BEGIN {
            c = 0.10 + (files * 0.15) + (lines * 0.002);
            if (c < 0.05) c = 0.05;
            if (c > 10.00) c = 10.00;
            printf "%.2f", c
          }')

          echo "cost=$COST" >> $GITHUB_OUTPUT

      - name: Record contribution
        if: env.API_URL != '' && env.API_KEY != '' && steps.commit_info.outputs.commit_count != '0'
        run: |
          curl -X POST "$API_URL/v1/contributions/github" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $API_KEY" \
            -d '{
              "contributor_email": "${{ steps.commit_info.outputs.author_email }}",
              "repository": "${{ github.repository }}",
              "commit_hash": "${{ steps.commit_info.outputs.commit_hash }}",
              "cost_amount": ${{ steps.calc_cost.outputs.cost }},
              "metadata": {
                "files_changed": ${{ steps.commit_info.outputs.files_changed }},
                "lines_added": ${{ steps.commit_info.outputs.lines_added }},
                "batch_mode": true
              }
            }'

      - name: Skip tracking when API secrets are unavailable
        if: env.API_URL == '' || env.API_KEY == ''
        run: |
          echo "Skipping contribution tracking because COHERENCE_API_URL/COHERENCE_API_KEY is not configured for this run."

      - name: Log contribution tracking result
        if: env.API_URL != '' && env.API_KEY != '' && steps.commit_info.outputs.commit_count != '0'
        run: |
          echo "Contribution recorded (daily batch)."
          echo "Cost: \$${{ steps.calc_cost.outputs.cost }}"
          echo "Latest commit: ${{ steps.commit_info.outputs.commit_hash }}"
          echo "Commits tracked: ${{ steps.commit_info.outputs.commit_count }}"
