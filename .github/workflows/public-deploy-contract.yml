name: Public Deploy Contract

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: public-deploy-contract-main
  cancel-in-progress: true

jobs:
  validate-public-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: write
    env:
      MVP_LOCAL_ONLY_VALIDATION: ${{ vars.MVP_LOCAL_ONLY_VALIDATION || '1' }}
      PUBLIC_DEPLOY_API_BASE: ${{ vars.PUBLIC_DEPLOY_API_BASE || 'https://api.coherencycoin.com' }}
      PUBLIC_DEPLOY_WEB_BASE: ${{ vars.PUBLIC_DEPLOY_WEB_BASE || 'https://coherencycoin.com' }}
      PUBLIC_DEPLOY_REQUIRE_API_HEALTH_SHA: ${{ vars.PUBLIC_DEPLOY_REQUIRE_API_HEALTH_SHA || '1' }}
      PUBLIC_DEPLOY_REQUIRE_WEB_HEALTH_PROXY_SHA: ${{ vars.PUBLIC_DEPLOY_REQUIRE_WEB_HEALTH_PROXY_SHA || '1' }}
      PUBLIC_DEPLOY_VERIFICATION_MAX_ATTEMPTS: ${{ vars.PUBLIC_DEPLOY_VERIFICATION_MAX_ATTEMPTS || '8' }}
      PUBLIC_DEPLOY_VERIFICATION_RETRY_SECONDS: ${{ vars.PUBLIC_DEPLOY_VERIFICATION_RETRY_SECONDS || '60' }}
      PUBLIC_DEPLOY_CONTRACT_BLOCK_THRESHOLD_SECONDS: ${{ vars.PUBLIC_DEPLOY_CONTRACT_BLOCK_THRESHOLD_SECONDS || '600' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install API dependencies
        run: |
          cd api && pip install -e ".[dev]"

      - name: Validate public deployment contract
        id: validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          cd api
          python scripts/validate_public_deploy_contract.py \
            --repo "${{ github.repository }}" \
            --branch main \
            --api-base "${PUBLIC_DEPLOY_API_BASE}" \
            --web-base "${PUBLIC_DEPLOY_WEB_BASE}" \
            --json > ../public_deploy_contract_report.json
          code=$?
          cd ..
          cat public_deploy_contract_report.json
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Select effective contract result
        id: outcome
        run: |
          echo "exit_code=${{ steps.validate.outputs.exit_code }}" >> "$GITHUB_OUTPUT"

      - name: Upload public deploy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: public_deploy_contract_report_${{ github.sha }}
          path: public_deploy_contract_report.json

      - name: Create or update deploy drift issue
        if: ${{ env.MVP_LOCAL_ONLY_VALIDATION != '1' && steps.outcome.outputs.exit_code != '0' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('public_deploy_contract_report.json', 'utf8'));
            const title = 'Public deployment contract failing on main';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Automated check detected public deployment drift.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Expected SHA: \`${report.expected_sha || 'unknown'}\``,
              `- Result: \`${report.result || 'blocked'}\``,
              `- Reason: ${report.reason || 'n/a'}`,
              `- Exit code: \`${"${{ steps.outcome.outputs.exit_code }}"}\``,
              '',
              'Failing checks:',
              ...(Array.isArray(report.failing_checks) && report.failing_checks.length
                ? report.failing_checks.map((x) => `- \`${x}\``)
                : ['- (none reported)']),
              '',
              'Raw report:',
              '```json',
              JSON.stringify(report, null, 2).slice(0, 6000),
              '```',
            ].join('\n');

            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (existing.data.items.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data.items[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Resolve deploy drift issue when contract passes
        if: ${{ env.MVP_LOCAL_ONLY_VALIDATION != '1' && steps.outcome.outputs.exit_code == '0' }}
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Public deployment contract failing on main';
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (existing.data.items.length === 0) {
              return;
            }
            const issue = existing.data.items[0];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Resolved by workflow run ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}. Public deployment contract is now passing.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
            });

      - name: Dispatch auto-heal workflow
        if: ${{ env.MVP_LOCAL_ONLY_VALIDATION != '1' && steps.outcome.outputs.exit_code != '0' && github.event_name == 'push' && vars.AUTO_HEAL_DEPLOY_GATES_ENABLED == '1' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/auto-heal-deploy-gates.yml/dispatches" \
            -d '{"ref":"main","inputs":{"sha":"${{ github.sha }}"}}'

      - name: Note local-only MVP mode
        if: ${{ env.MVP_LOCAL_ONLY_VALIDATION == '1' }}
        run: |
          echo "MVP_LOCAL_ONLY_VALIDATION=1; hosted public deploy checks are non-blocking until provider is restored."

      - name: Fail when contract is not satisfied
        if: ${{ env.MVP_LOCAL_ONLY_VALIDATION != '1' && steps.outcome.outputs.exit_code != '0' && github.event_name != 'schedule' }}
        run: |
          echo "Public deployment contract failed"
          exit 1
