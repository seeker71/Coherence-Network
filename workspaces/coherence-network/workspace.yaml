id: coherence-network
name: Coherence Network
description: |
  Default workspace for the Coherence Network platform — the idea realization
  system for humanity. Every idea tracked, funded, built, measured.
  This workspace hosts the platform's own ideas and specs. New contributor
  teams create their own workspace with their own pillars, agents, templates,
  and workflows.
visibility: public
bundle_path: workspaces/coherence-network
# Legacy note: this bundle is intentionally thin. Ideas, specs, agent personas,
# and the spec template still live at the repo root (ideas/, specs/,
# .claude/agents/, specs/TEMPLATE.md) for backward compat. The
# CoLocatedResolver special-cases workspace_id="coherence-network" to resolve
# those paths. New workspaces put everything inside workspaces/{slug}/.
