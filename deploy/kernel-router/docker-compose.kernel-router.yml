# docker-compose.kernel-router.yml — the kernel-router as the native-first API
# front door. An OVERLAY on the production docker-compose.yml.
#
# The production deploy runs `docker compose -f docker-compose.yml ...` (see
# deploy/hostinger/auto-deploy.sh). This file is layered only for the kernel
# services. Its Host(api.coherencycoin.com) router has higher priority than the
# base API router, so ordinary API traffic enters the kernel-router first.
#
# WHAT THIS IS: the deployable native-first step of the flip in
# kernels/KERNEL_AS_ROUTER.md. The kernel-router (form-kernel-rust serve) sits in
# front of the api service and, with the production manifest, serves explicit
# native rows while fanning out the tail to api:8000. Inside the production
# manifest, mutable ideas/specs no-header traffic accepts the implicit native
# invitation; X-Form-Python-Fallback is the explicit refusal/control signal. The
# native mutation handler reads the same production config-file carrier as the
# API and performs pg_exec inside Form when the mounted config includes
# database.url. The native-first Host router below is intentionally broad:
# website/API smoke and tool flows are the gate. Native rows answer; unmatched
# paths transparently fan out through Python with X-Form-Router evidence.
#
# ---------------------------------------------------------------------------
# HOW TO RUN IT AS THE PUBLIC NATIVE-FIRST FRONT DOOR:
#
#   # from the compose root, layer this overlay on top of the base compose
#   docker compose \
#     -f docker-compose.yml \
#     -f repo/deploy/kernel-router/docker-compose.kernel-router.yml \
#     up -d --build kernel-router
#
#   # Ordinary public API calls enter the kernel-router first. Native rows answer;
#   # all other paths fan out to api:8000. Explicit public-gate calls still match
#   # coherence-api-kernel-public-gate-canary with higher priority:
#   curl -i -X POST https://api.coherencycoin.com/api/ideas \
#     -H 'Content-Type: application/json' \
#     -H 'X-Form-Native-Public-Gate: 1' \
#     -d '{"id":"idea-public-canary","name":"Public Canary","description":"gate","manifestation_status":"partial"}'
#   # Expected: 202 + X-Form-Router: native-kernel + decision_receipt.
#   # No-header POST /api/ideas also routes to native-kernel as the default
#   # invitation. Add X-Form-Python-Fallback: 1 to explicitly fan out.
#
# ---------------------------------------------------------------------------
# ROLLBACK:
#
#   Remove or retarget coherence-api-kernel-native-first. The base api router
#   remains present underneath, and request-level fallback is always available
#   with X-Form-Python-Fallback for routes that carry that control signal.

services:
  kernel-router:
    build:
      # Build context is the repo root (where Dockerfile.kernel-router lives).
      # On the VPS the repo is cloned at ${COMPOSE_ROOT}/repo, so from the
      # compose root the context is ./repo. Adjust if layering from elsewhere.
      context: ./repo
      dockerfile: Dockerfile.kernel-router
    image: coherence-network-kernel-router:latest
    restart: unless-stopped
    environment:
      # The fan-out target: the api service on the shared compose network.
      UPSTREAM_URL: "http://api:8000"
      KERNEL_ROUTER_PORT: "8080"
      ROUTES_FILE: "/routes/production-routes.fk"
      KERNEL_ROUTER_CONFIG_FILE: "/run/coherence-network/config.json"
      # KERNEL_ROUTER_WORKERS: "4"   # optional pool size; default = host parallelism
    volumes:
      # Runtime-only production config overlay. This file is documented in
      # docs/PRODUCTION-SUBSTRATE.md and is not repository memory.
      - /root/.coherence-network/config.json:/run/coherence-network/config.json:ro
    depends_on:
      # The fan-out upstream must exist; the router proxies to it.
      - api
      # Header-gated native mutation canaries execute through production
      # Postgres when the config overlay carries database.url.
      - postgres

    # ----------------------------------------------------------------------
    # TRAEFIK LABELS — ACTIVE NATIVE-FIRST API FRONT DOOR. The live VPS runs
    # Traefik 3.x, so these use the v3 `Header` matcher. Specific native/BML
    # routers keep higher priorities. The broad Host router sits above the base
    # API router and below explicit native rows, making the kernel-router the
    # ordinary API entrance while preserving fan-out for the Python tail.
    # ----------------------------------------------------------------------
    labels:
      traefik.enable: "true"
      traefik.http.routers.coherence-api-kernel-preview-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Preview`,`1`)"
      traefik.http.routers.coherence-api-kernel-preview-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-preview-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-preview-canary.priority: "1000"
      traefik.http.routers.coherence-api-kernel-preview-canary.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Public-Gate`,`1`)"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.priority: "1100"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-native-first.rule: "Host(`api.coherencycoin.com`)"
      traefik.http.routers.coherence-api-kernel-native-first.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-native-first.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-native-first.priority: "700"
      traefik.http.routers.coherence-api-kernel-native-first.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/ideas`)"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`PATCH`) && PathRegexp(`^/api/ideas/[^/]+$`)"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/spec-registry`)"
