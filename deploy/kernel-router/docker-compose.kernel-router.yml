# docker-compose.kernel-router.yml — the kernel-router as a HEADER-GATED CANARY
# service. An OVERLAY, intentionally NOT the whole production docker-compose.yml.
#
# The production deploy runs `docker compose -f docker-compose.yml ...` (see
# deploy/hostinger/auto-deploy.sh). This file is layered only for the canary
# service; it does NOT replace the api service's normal Traefik route.
#
# WHAT THIS IS: the deployable shadow step of the flip in
# kernels/KERNEL_AS_ROUTER.md. The kernel-router (form-kernel-rust serve) sits in
# front of the api service and, with the production manifest, serves explicit
# native rows while fanning out the tail to api:8000. Inside the production
# manifest, mutable ideas/specs no-header traffic that reaches the kernel accepts
# the implicit native invitation; X-Form-Python-Fallback is the explicit
# refusal/control signal. The native mutation handler reads the same production
# config-file carrier as the API and performs pg_exec inside Form when the
# mounted config includes database.url. The production-manifest Traefik rules
# below are still HEADER-GATED, so mutable ordinary no-header traffic continues
# to reach api:8000 until the public no-header flip is separately performed and
# verified. The kernel-image proposal POST and inventory flow GET paths are the
# explicit path-specific exceptions served by the BML catalog service below.
#
# WHAT THIS IS NOT: the all-traffic flip. The full flip is pointing Traefik's
# ordinary Host(api.coherencycoin.com) router at this service instead of at the
# api service. This overlay keeps the existing api router in place and adds only
# higher-priority routers for explicit canary headers, plus narrow path-specific
# BML public routes whose contracts are already native-proofed.
#
# ---------------------------------------------------------------------------
# HOW TO RUN IT AS THE PUBLIC CANARY (NO ordinary traffic change):
#
#   # from the compose root, layer this overlay on top of the base compose
#   docker compose \
#     -f docker-compose.yml \
#     -f repo/deploy/kernel-router/docker-compose.kernel-router.yml \
#     up -d --build kernel-router
#
#   # Ordinary public calls still match the api service's existing router,
#   # except the preview-only kernel-image proposal POST path below.
#   # Explicit canary calls match coherence-api-kernel-public-gate-canary:
#   curl -i -X POST https://api.coherencycoin.com/api/ideas \
#     -H 'Content-Type: application/json' \
#     -H 'X-Form-Native-Public-Gate: 1' \
#     -d '{"id":"idea-public-canary","name":"Public Canary","description":"gate","manifestation_status":"partial"}'
#   # Expected: 202 + X-Form-Router: native-kernel + decision_receipt.
#
# ---------------------------------------------------------------------------
# THE FULL FLIP (SEPARATE FROM THIS CANARY):
#
#   To make the kernel-router the ordinary front door, change the base
#   coherence-api router to point Host(api.coherencycoin.com) at kernel-router.
#   Rollback = restore the api rule. This overlay deliberately stops before
#   that move.

services:
  kernel-router:
    build:
      # Build context is the repo root (where Dockerfile.kernel-router lives).
      # On the VPS the repo is cloned at ${COMPOSE_ROOT}/repo, so from the
      # compose root the context is ./repo. Adjust if layering from elsewhere.
      context: ./repo
      dockerfile: Dockerfile.kernel-router
    image: coherence-network-kernel-router:latest
    restart: unless-stopped
    environment:
      # The fan-out target: the api service on the shared compose network.
      UPSTREAM_URL: "http://api:8000"
      KERNEL_ROUTER_PORT: "8080"
      ROUTES_FILE: "/routes/production-routes.fk"
      KERNEL_ROUTER_CONFIG_FILE: "/run/coherence-network/config.json"
      # KERNEL_ROUTER_WORKERS: "4"   # optional pool size; default = host parallelism
    volumes:
      # Runtime-only production config overlay. This file is documented in
      # docs/PRODUCTION-SUBSTRATE.md and is not repository memory.
      - /root/.coherence-network/config.json:/run/coherence-network/config.json:ro
    depends_on:
      # The fan-out upstream must exist; the router proxies to it.
      - api
      # Header-gated native mutation canaries execute through production
      # Postgres when the config overlay carries database.url.
      - postgres

    # ----------------------------------------------------------------------
    # TRAEFIK LABELS — ACTIVE HEADER-GATED CANARY. The live VPS runs Traefik
    # 3.x, so these use the v3 `Header` matcher. The router names are distinct
    # from the base `coherence-api` router, and priorities are higher so the
    # explicit headers win while ordinary requests keep matching api:8000.
    # ----------------------------------------------------------------------
    labels:
      traefik.enable: "true"
      traefik.http.routers.coherence-api-kernel-preview-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Preview`,`1`)"
      traefik.http.routers.coherence-api-kernel-preview-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-preview-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-preview-canary.priority: "1000"
      traefik.http.routers.coherence-api-kernel-preview-canary.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Public-Gate`,`1`)"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.priority: "1100"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.service: "coherence-api-kernel-canary"
      traefik.http.services.coherence-api-kernel-canary.loadbalancer.server.port: "8080"

  kernel-router-bml-front-door:
    build:
      context: ./repo
      dockerfile: Dockerfile.kernel-router
    image: coherence-network-kernel-router:latest
    restart: unless-stopped
    environment:
      UPSTREAM_URL: "http://api:8000"
      KERNEL_ROUTER_PORT: "8080"
      ROUTES_FILE: "/routes/api.bml"
      STDLIB_DIR: "/app/form/form-stdlib"
      KERNEL_ROUTER_CONFIG_FILE: "/run/coherence-network/config.json"
    volumes:
      - /root/.coherence-network/config.json:/run/coherence-network/config.json:ro
    depends_on:
      - api
      - postgres
    labels:
      traefik.enable: "true"
      traefik.http.routers.coherence-api-kernel-image-proposal.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/substrate/kernel-image/proposals`)"
      traefik.http.routers.coherence-api-kernel-image-proposal.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-image-proposal.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-image-proposal.priority: "1200"
      traefik.http.routers.coherence-api-kernel-image-proposal.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-inventory-flow.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/inventory/flow`)"
      traefik.http.routers.coherence-api-inventory-flow.entrypoints: "websecure"
      traefik.http.routers.coherence-api-inventory-flow.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-inventory-flow.priority: "1190"
      traefik.http.routers.coherence-api-inventory-flow.service: "coherence-api-kernel-bml-front-door"
      traefik.http.services.coherence-api-kernel-bml-front-door.loadbalancer.server.port: "8080"

# The api service is defined in the base docker-compose.yml. This overlay only
# adds/overrides kernel-router services and narrow higher-priority Traefik
# routers. It does NOT remove or replace the api service's ordinary router.
