# docker-compose.kernel-router.yml — the kernel-router as a bounded mutable
# native front door. An OVERLAY, intentionally NOT the whole production
# docker-compose.yml.
#
# The production deploy runs `docker compose -f docker-compose.yml ...` (see
# deploy/hostinger/auto-deploy.sh). This file is layered only for the kernel
# services; it does NOT replace the api service's normal Traefik route.
#
# WHAT THIS IS: the deployable bounded step of the flip in
# kernels/KERNEL_AS_ROUTER.md. The kernel-router (form-kernel-rust serve) sits in
# front of the api service and, with the production manifest, serves explicit
# native rows while fanning out the tail to api:8000. Inside the production
# manifest, mutable ideas/specs no-header traffic that reaches the kernel accepts
# the implicit native invitation; X-Form-Python-Fallback is the explicit
# refusal/control signal. The native mutation handler reads the same production
# config-file carrier as the API and performs pg_exec inside Form when the
# mounted config includes database.url. The production-manifest Traefik rules
# below route only mutable POST/PATCH/DELETE ideas/specs paths to the
# kernel-router by default; preview/public-gate headers stay higher-priority
# explicit witnesses. The kernel-image proposal POST is a narrow public BML
# path, and the inventory flow GET path remains an explicit
# X-Form-Native-Inventory header-gated BML canary until the full public
# aggregator parity is native-proofed.
#
# WHAT THIS IS NOT: the all-traffic flip. The full flip is pointing Traefik's
# ordinary Host(api.coherencycoin.com) router at this service instead of at the
# api service. This overlay keeps the existing api router in place and adds only
# bounded higher-priority routers for mutable ideas/specs paths, explicit canary
# headers, plus narrow BML public routes whose contracts are already
# native-proofed.
#
# ---------------------------------------------------------------------------
# HOW TO RUN IT AS THE PUBLIC BOUNDED MUTATION FLIP:
#
#   # from the compose root, layer this overlay on top of the base compose
#   docker compose \
#     -f docker-compose.yml \
#     -f repo/deploy/kernel-router/docker-compose.kernel-router.yml \
#     up -d --build kernel-router
#
#   # Ordinary public calls still match the api service's existing router except
#   # POST/PATCH/DELETE ideas/specs mutable paths and the kernel-image proposal
#   # POST path. Inventory flow native BML requires X-Form-Native-Inventory: 1.
#   # Explicit public-gate calls match coherence-api-kernel-public-gate-canary:
#   curl -i -X POST https://api.coherencycoin.com/api/ideas \
#     -H 'Content-Type: application/json' \
#     -H 'X-Form-Native-Public-Gate: 1' \
#     -d '{"id":"idea-public-canary","name":"Public Canary","description":"gate","manifestation_status":"partial"}'
#   # Expected: 202 + X-Form-Router: native-kernel + decision_receipt.
#   # No-header POST /api/ideas also routes to native-kernel as the default
#   # invitation. Add X-Form-Python-Fallback: 1 to explicitly fan out.
#
# ---------------------------------------------------------------------------
# THE FULL ALL-TRAFFIC FLIP (SEPARATE FROM THIS BOUNDED MUTATION FLIP):
#
#   To make the kernel-router the ordinary front door, change the base
#   coherence-api router to point Host(api.coherencycoin.com) at kernel-router.
#   Rollback = restore the api rule. This overlay deliberately stops before that
#   move; rollback for this bounded flip is removing or retargeting the five
#   mutable method/path routers below.

services:
  kernel-router:
    build:
      # Build context is the repo root (where Dockerfile.kernel-router lives).
      # On the VPS the repo is cloned at ${COMPOSE_ROOT}/repo, so from the
      # compose root the context is ./repo. Adjust if layering from elsewhere.
      context: ./repo
      dockerfile: Dockerfile.kernel-router
    image: coherence-network-kernel-router:latest
    restart: unless-stopped
    environment:
      # The fan-out target: the api service on the shared compose network.
      UPSTREAM_URL: "http://api:8000"
      KERNEL_ROUTER_PORT: "8080"
      ROUTES_FILE: "/routes/production-routes.fk"
      KERNEL_ROUTER_CONFIG_FILE: "/run/coherence-network/config.json"
      # KERNEL_ROUTER_WORKERS: "4"   # optional pool size; default = host parallelism
    volumes:
      # Runtime-only production config overlay. This file is documented in
      # docs/PRODUCTION-SUBSTRATE.md and is not repository memory.
      - /root/.coherence-network/config.json:/run/coherence-network/config.json:ro
    depends_on:
      # The fan-out upstream must exist; the router proxies to it.
      - api
      # Header-gated native mutation canaries execute through production
      # Postgres when the config overlay carries database.url.
      - postgres

    # ----------------------------------------------------------------------
    # TRAEFIK LABELS — ACTIVE BOUNDED MUTABLE NATIVE ROUTERS. The live VPS runs Traefik
    # 3.x, so these use the v3 `Header` matcher. The router names are distinct
    # from the base `coherence-api` router, and priorities are higher so the
    # explicit headers win while the bounded no-header mutation paths match this
    # service. Unlisted ordinary requests keep matching api:8000.
    # ----------------------------------------------------------------------
    labels:
      traefik.enable: "true"
      traefik.http.routers.coherence-api-kernel-preview-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Preview`,`1`)"
      traefik.http.routers.coherence-api-kernel-preview-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-preview-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-preview-canary.priority: "1000"
      traefik.http.routers.coherence-api-kernel-preview-canary.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.rule: "Host(`api.coherencycoin.com`) && Header(`X-Form-Native-Public-Gate`,`1`)"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.priority: "1100"
      traefik.http.routers.coherence-api-kernel-public-gate-canary.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/ideas`)"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-ideas-create-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`PATCH`) && PathRegexp(`^/api/ideas/[^/]+$`)"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-ideas-update-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/spec-registry`)"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-specs-create-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`PATCH`) && PathRegexp(`^/api/spec-registry/[^/]+$`)"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`DELETE`) && PathRegexp(`^/api/spec-registry/[^/]+$`)"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.service: "coherence-api-kernel-canary"
      traefik.http.services.coherence-api-kernel-canary.loadbalancer.server.port: "8080"

  kernel-router-bml-front-door:
    build:
      context: ./repo
      dockerfile: Dockerfile.kernel-router
    image: coherence-network-kernel-router:latest
    restart: unless-stopped
    environment:
      UPSTREAM_URL: "http://api:8000"
      KERNEL_ROUTER_PORT: "8080"
      ROUTES_FILE: "/routes/api.bml"
      STDLIB_DIR: "/app/form/form-stdlib"
      KERNEL_ROUTER_CONFIG_FILE: "/run/coherence-network/config.json"
    volumes:
      - /root/.coherence-network/config.json:/run/coherence-network/config.json:ro
    depends_on:
      - api
      - postgres
    labels:
      traefik.enable: "true"
      traefik.http.routers.coherence-api-kernel-image-proposal.rule: "Host(`api.coherencycoin.com`) && Method(`POST`) && Path(`/api/substrate/kernel-image/proposals`)"
      traefik.http.routers.coherence-api-kernel-image-proposal.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-image-proposal.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-image-proposal.priority: "1200"
      traefik.http.routers.coherence-api-kernel-image-proposal.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-inventory-flow.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/inventory/flow`) && Header(`X-Form-Native-Inventory`,`1`)"
      traefik.http.routers.coherence-api-inventory-flow.entrypoints: "websecure"
      traefik.http.routers.coherence-api-inventory-flow.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-inventory-flow.priority: "1190"
      traefik.http.routers.coherence-api-inventory-flow.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-inventory-flow-observation.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/_form/inventory-flow-observation`) && Header(`X-Form-Observe`,`1`)"
      traefik.http.routers.coherence-api-inventory-flow-observation.entrypoints: "websecure"
      traefik.http.routers.coherence-api-inventory-flow-observation.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-inventory-flow-observation.priority: "1195"
      traefik.http.routers.coherence-api-inventory-flow-observation.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-household-events.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/household/events`)"
      traefik.http.routers.coherence-api-household-events.entrypoints: "websecure"
      traefik.http.routers.coherence-api-household-events.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-household-events.priority: "1180"
      traefik.http.routers.coherence-api-household-events.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-kernel-status.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/utils/kernel_status`)"
      traefik.http.routers.coherence-api-kernel-status.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-status.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-status.priority: "1185"
      traefik.http.routers.coherence-api-kernel-status.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-agent-tasks-active.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/agent/tasks/active`)"
      traefik.http.routers.coherence-api-agent-tasks-active.entrypoints: "websecure"
      traefik.http.routers.coherence-api-agent-tasks-active.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-agent-tasks-active.priority: "1184"
      traefik.http.routers.coherence-api-agent-tasks-active.service: "coherence-api-kernel-bml-front-door"
      traefik.http.routers.coherence-api-agent-tasks-activity.rule: "Host(`api.coherencycoin.com`) && Method(`GET`) && Path(`/api/agent/tasks/activity`)"
      traefik.http.routers.coherence-api-agent-tasks-activity.entrypoints: "websecure"
      traefik.http.routers.coherence-api-agent-tasks-activity.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-agent-tasks-activity.priority: "1184"
      traefik.http.routers.coherence-api-agent-tasks-activity.service: "coherence-api-kernel-bml-front-door"
      traefik.http.services.coherence-api-kernel-bml-front-door.loadbalancer.server.port: "8080"

# The api service is defined in the base docker-compose.yml. This overlay only
# adds/overrides kernel-router services and narrow higher-priority Traefik
# routers. It does NOT remove or replace the api service's ordinary Host router.
