      traefik.http.routers.coherence-api-kernel-specs-update-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.priority: "900"
      traefik.http.routers.coherence-api-kernel-specs-update-native-default.service: "coherence-api-kernel-canary"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.rule: "Host(`api.coherencycoin.com`) && Method(`DELETE`) && PathRegexp(`^/api/spec-registry/[^/]+$`)"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.entrypoints: "websecure"
      traefik.http.routers.coherence-api-kernel-specs-delete-native-default.tls.certresolver: "letsencrypt"
