# Personal influences seed — the people, groups, and projects that
# shaped one contributor. Each entry becomes a graph node so the rest
# of the network can discover, link, and eventually — once the graph
# grows organically from real visits and edges — surface kinship.
#
# Node types used (see api/app/models/graph.py):
#   contributor   — individual humans and single-artist projects
#   community     — sanctuaries, dance floors, festivals, ritual circles
#   network-org   — broader ecosystems / organizational projects
#   asset         — notable works (albums, tracks, mixes), type=CONTENT
#
# Edges used (see api/app/config/edge_types.py):
#   contributes-to — person → group/work
#   inspired-by    — source contributor → each top-level entry
#
# Every placeholder node is claimable later by the real person or
# collective. Nothing is requested from them by this import.

source:
